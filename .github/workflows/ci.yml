name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Run smoke tests
        run: npm run smoke

      # - name: Run E2E tests
      #   if: ${{ secrets.OPIK_API_KEY != '' }}
      #   env:
      #     OPIK_E2E: "1"
      #     OPIK_API_KEY: ${{ secrets.OPIK_API_KEY }}
      #     OPIK_URL_OVERRIDE: ${{ secrets.OPIK_URL_OVERRIDE || 'https://www.comet.com/opik/api' }}
      #     OPIK_PROJECT_NAME: ${{ secrets.OPIK_PROJECT_NAME || 'openclaw' }}
      #     OPIK_WORKSPACE: ${{ secrets.OPIK_WORKSPACE || 'default' }}
      #   run: npm run test:e2e

      - name: Verify package payload
        run: npm pack --dry-run
