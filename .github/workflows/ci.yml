name: Node CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.build.json"
      - "index.ts"
      - "openclaw.plugin.json"
      - "src/**"
      - "scripts/check-pack-payload.mjs"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.build.json"
      - "index.ts"
      - "openclaw.plugin.json"
      - "src/**"
      - "scripts/check-pack-payload.mjs"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Run smoke tests
        run: npm run smoke

      - name: Verify package payload
        run: npm run pack:check
