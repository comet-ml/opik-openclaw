name: Node CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Run smoke tests
        run: npm run smoke

      - name: Verify package payload
        run: npm run pack:check

  clawhub-dry-run:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/clawhub-package-publish.yml
    with:
      dry_run: true

  clawhub-suspicious-check:
    name: ClawHub suspicious scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad
        with:
          bun-version: 1.3.10

      - name: Checkout ClawHub scanner source
        uses: actions/checkout@v6
        with:
          repository: openclaw/clawhub
          ref: 4787be4eb1e06b4ffb947456a6559835a4307f7b
          path: clawhub-source

      - name: Install ClawHub scanner dependencies
        working-directory: clawhub-source
        run: bun install --frozen-lockfile

      - name: Run ClawHub suspicious scan
        env:
          CLAWHUB_SOURCE_DIR: clawhub-source
        run: bun --bun .scripts/check-clawhub-suspicious.mjs .
